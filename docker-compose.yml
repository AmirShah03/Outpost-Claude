services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outpost_user
      POSTGRES_PASSWORD: outpost_pass
      POSTGRES_DB: outpost_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./src/db/seed.sql:/docker-entrypoint-initdb.d/zzz_seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U outpost_user -d outpost_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
